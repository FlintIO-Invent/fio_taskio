{% extends 'inheritance/authentication_parent.html'%} 
{% load static %} 
  
{% block content %}
<div class="container">
  <div class="row flex-center min-vh-100 py-5">
    <div class="col-sm-10 col-md-8 col-lg-5 col-xl-5 col-xxl-3">
      <a class="d-flex flex-center text-decoration-none mb-4" href="">
        <img src="{% static 'assets/img/icons/taskiologo.png' %}" alt="TaskIO - Tenant Management System" width="58">
      </a>

      <form method="POST">
        {% csrf_token %}
        <div class="text-center mb-7">
          <h3 class="text-body-highlight">Sign In</h3>
          <p class="text-body-tertiary">Enter your credentials to access your dashboard</p>
        </div>

        <div class="mb-3 text-start">
          <div class="form-icon-container">
            <input class="form-control form-icon-input" id="email" name="email" type="email" placeholder="name@example.com">
            <span class="fas fa-user text-body fs-9 form-icon"></span>
          </div>
        </div>

        <div class="mb-3 text-start">
          <div class="form-icon-container" data-password>
            <input class="form-control form-icon-input pe-6" id="password" name="password" type="password"
                   placeholder="Password">
            <span class="fas fa-key text-body fs-9 form-icon"></span>
            <!-- eye-toggle button unchanged -->
          </div>
        </div>

        <button class="btn btn-primary w-100 mb-3" type="submit">Sign In</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
